<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlatGo — Platform Sewa Alat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --blue-mid: #dbeafe;
  --blue-dark: #1d4ed8;
  --green: #16a34a;
  --green-light: #dcfce7;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --white: #ffffff;
  --sidebar-w: 240px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(37,99,235,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── ROLE SELECTOR ─── */
#role-select-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #2563eb 100%);
  position: relative;
  overflow: hidden;
}
#role-select-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 30%, rgba(99,102,241,.25) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(37,99,235,.2) 0%, transparent 50%);
}
.role-box {
  position: relative;
  text-align: center;
  padding: 0 20px;
  max-width: 600px;
  width: 100%;
}
.role-logo {
  font-size: 2.6rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: -1.5px;
  margin-bottom: 6px;
}
.role-logo span { color: #60a5fa; }
.role-sub { color: rgba(255,255,255,.6); font-size: .9rem; margin-bottom: 44px; }
.role-cards {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.role-card {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 28px 24px;
  width: 160px;
  cursor: pointer;
  transition: all .2s ease;
  color: #fff;
}
.role-card:hover {
  background: rgba(255,255,255,.15);
  border-color: rgba(255,255,255,.4);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,.3);
}
.role-icon { font-size: 2.4rem; margin-bottom: 10px; }
.role-name { font-size: .9rem; font-weight: 700; letter-spacing: .5px; }
.role-desc { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 4px; }

/* ─── MAIN APP SHELL ─── */
#app { display: none; min-height: 100vh; }
.app-layout { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--gray-900);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform .3s ease;
}
.sidebar-logo {
  padding: 22px 20px 18px;
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: -1px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.sidebar-logo span { color: #60a5fa; }
.sidebar-badge {
  display: inline-block;
  font-size: .6rem;
  background: var(--blue);
  color: #fff;
  padding: 1px 7px;
  border-radius: 20px;
  font-weight: 600;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: .5px;
}
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-title {
  font-size: .65rem;
  font-weight: 700;
  color: rgba(255,255,255,.3);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 14px 20px 6px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  color: rgba(255,255,255,.55);
  cursor: pointer;
  border-radius: 0;
  transition: all .15s;
  font-size: .85rem;
  font-weight: 500;
  position: relative;
}
.nav-link:hover { color: #fff; background: rgba(255,255,255,.06); }
.nav-link.active {
  color: #fff;
  background: rgba(37,99,235,.3);
}
.nav-link.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 3px;
  background: var(--blue);
  border-radius: 0 3px 3px 0;
}
.nav-icon { font-size: 1.1rem; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: .6rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 20px;
}
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,.07);
}
.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.user-name { font-size: .82rem; font-weight: 600; color: #fff; }
.user-role { font-size: .68rem; color: rgba(255,255,255,.4); margin-top: 1px; }
.logout-btn {
  margin-left: auto;
  font-size: .7rem;
  color: rgba(255,255,255,.35);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all .15s;
}
.logout-btn:hover { color: #fff; background: rgba(255,255,255,.1); }

/* ─── MAIN CONTENT ─── */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: var(--gray-900); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.notif-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  position: relative;
  transition: background .15s;
}
.notif-btn:hover { background: var(--gray-200); }
.notif-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  border: 2px solid var(--white);
}
.search-topbar {
  background: var(--gray-100);
  border-radius: 10px;
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .82rem;
  color: var(--gray-400);
  cursor: text;
  min-width: 220px;
}
.page-content { padding: 28px; }

/* ─── CARDS & COMPONENTS ─── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}
.card-title {
  font-size: .88rem;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 16px;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: transform .2s, box-shadow .2s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.stat-label { font-size: .74rem; color: var(--gray-500); font-weight: 500; }
.stat-value { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); line-height: 1.1; margin-top: 2px; }
.stat-change {
  font-size: .7rem;
  font-weight: 600;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.stat-change.up { color: var(--green); }
.stat-change.down { color: var(--red); }

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: .7rem;
  font-weight: 700;
  color: var(--gray-500);
  letter-spacing: .5px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--gray-200);
  white-space: nowrap;
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-800);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-50); }

/* ─── BADGES ─── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .68rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge-blue { background: var(--blue-mid); color: var(--blue-dark); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gray { background: var(--gray-100); color: var(--gray-500); }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 9px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  font-family: var(--font);
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-dark); }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--gray-200);
  color: var(--gray-700);
}
.btn-outline:hover { border-color: var(--blue); color: var(--blue); }
.btn-sm { padding: 5px 12px; font-size: .74rem; }
.btn-danger { background: var(--red-light); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-success { background: var(--green-light); color: var(--green); }
.btn-success:hover { background: var(--green); color: #fff; }

/* ─── FORM ELEMENTS ─── */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: .78rem; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
input[type=text], input[type=email], input[type=number], input[type=date], select, textarea {
  width: 100%;
  padding: 9px 13px;
  border: 1.5px solid var(--gray-200);
  border-radius: 9px;
  font-size: .84rem;
  font-family: var(--font);
  color: var(--gray-900);
  background: var(--white);
  transition: border-color .15s;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--blue); }
textarea { resize: vertical; min-height: 80px; }

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 18px;
  padding: 28px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.2);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 1rem; font-weight: 700; }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: background .15s;
}
.modal-close:hover { background: var(--gray-200); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ─── PRODUCT CARD (Borrower) ─── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.product-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.product-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.product-thumb {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
}
.product-info { padding: 12px 14px; }
.product-name { font-size: .85rem; font-weight: 700; color: var(--gray-900); }
.product-cat { font-size: .68rem; color: var(--gray-400); margin-top: 2px; }
.product-price { font-size: .88rem; font-weight: 700; color: var(--blue); margin-top: 6px; }
.product-rating { font-size: .7rem; color: var(--gray-400); margin-top: 3px; }
.product-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.avail-dot {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .68rem; font-weight: 600;
}
.avail-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
}
.avail-dot.available { color: var(--green); }
.avail-dot.available::before { background: var(--green); }
.avail-dot.rented { color: var(--amber); }
.avail-dot.rented::before { background: var(--amber); }

/* ─── PAGE SECTIONS ─── */
.section { display: none; }
.section.active { display: block; }

/* ─── CHART PLACEHOLDER ─── */
.mini-chart {
  height: 60px;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 0 2px;
}
.bar {
  flex: 1;
  border-radius: 4px 4px 0 0;
  background: var(--blue-mid);
  transition: background .2s;
  position: relative;
}
.bar:hover { background: var(--blue); }
.bar-tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gray-900);
  color: #fff;
  font-size: .64rem;
  padding: 3px 7px;
  border-radius: 5px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
  margin-bottom: 4px;
}
.bar:hover .bar-tooltip { opacity: 1; }

/* ─── TIMELINE ─── */
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item {
  display: flex;
  gap: 14px;
  padding-bottom: 18px;
  position: relative;
}
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.tl-item:not(:last-child) .tl-dot::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: calc(100% + 2px);
  background: var(--gray-200);
  z-index: 0;
}
.tl-body { flex: 1; }
.tl-title { font-size: .82rem; font-weight: 600; color: var(--gray-800); }
.tl-desc { font-size: .74rem; color: var(--gray-500); margin-top: 2px; }
.tl-time { font-size: .68rem; color: var(--gray-400); margin-top: 3px; font-family: var(--mono); }

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--gray-200);
  background: transparent;
  color: var(--gray-600);
  font-family: var(--font);
  transition: all .15s;
}
.filter-btn.active {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.filter-btn:not(.active):hover { border-color: var(--blue); color: var(--blue); }
.spacer { flex: 1; }

/* ─── DETAIL PANEL ─── */
.detail-panel {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px;
}

/* ─── GRID LAYOUTS ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ─── RATING STARS ─── */
.stars { color: #f59e0b; letter-spacing: 1px; }

/* ─── TOAST ─── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}
.toast {
  background: var(--gray-900);
  color: #fff;
  padding: 12px 18px;
  border-radius: 12px;
  font-size: .82rem;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideInToast .25s ease;
  min-width: 240px;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
@keyframes slideInToast {
  from { transform: translateX(80px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.empty-icon { font-size: 3rem; margin-bottom: 10px; }
.empty-text { font-size: .88rem; font-weight: 500; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 10px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .grid-2 { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}

/* ─── CATEGORY PILLS ─── */
.cat-pill {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: .74rem;
  font-weight: 600;
  background: var(--blue-light);
  color: var(--blue);
}

/* ─── BOOKING DETAIL CARD ─── */
.booking-item {
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
}
.booking-item:last-child { border-bottom: none; }
.booking-thumb {
  width: 52px; height: 52px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}
.booking-name { font-size: .86rem; font-weight: 700; color: var(--gray-900); }
.booking-dates { font-size: .74rem; color: var(--gray-500); margin-top: 2px; }
.booking-price { margin-left: auto; font-size: .9rem; font-weight: 700; color: var(--blue); }
.booking-status { font-size: .7rem; font-weight: 600; margin-top: 3px; text-align: right; }

/* ─── SEARCH INPUT ─── */
.search-input-wrap {
  position: relative;
}
.search-input-wrap input {
  padding-left: 36px;
}
.search-input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
  font-size: .85rem;
}

/* ─── PROGRESS BAR ─── */
.progress-bar {
  height: 6px;
  background: var(--gray-100);
  border-radius: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 20px;
  background: var(--blue);
  transition: width .4s ease;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--gray-100);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 20px;
  width: fit-content;
}
.tab {
  padding: 7px 18px;
  border-radius: 8px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--gray-500);
  transition: all .15s;
}
.tab.active {

// ─── MODALS ───
function openModal(title, body, footer='') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function openAddItemModal() {
  openModal('Tambah Alat Baru', `
    <div class="form-group"><label>Nama Alat</label><input type="text" placeholder="Misal: Drone DJI Mini 3 Pro" id="mi_name"></div>
    <div class="form-group"><label>Kategori</label>
      <select id="mi_cat"><option>Elektronik</option><option>Outdoor</option><option>Olahraga</option><option>Industri</option></select>
    </div>
    <div class="form-group"><label>Harga per Hari (Rp)</label><input type="number" placeholder="150000" id="mi_price"></div>
    <div class="form-group"><label>Deskripsi</label><textarea placeholder="Deskripsi alat..." id="mi_desc"></textarea></div>
    <div class="form-group"><label>Emoji / Ikon</label><input type="text" placeholder="🚁" id="mi_emoji" maxlength="2"></div>
  `,`
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="submitAddItem()">Tambah Alat</button>
  `);
}

function submitAddItem() {
  const name = document.getElementById('mi_name').value;
  const cat = document.getElementById('mi_cat').value;
  const price = parseInt(document.getElementById('mi_price').value) || 100000;
  const desc = document.getElementById('mi_desc').value;
  const emoji = document.getElementById('mi_emoji').value || '📦';
  if (!name) { showToast('Nama alat wajib diisi!', 'error'); return; }
  const colors = ['#dbeafe','#dcfce7','#fef9c3','#ede9fe','#fce7f3'];
  store.items.push({ id: store.items.length+1, name, category: cat, price, owner: 'Andi Wijaya', ownerId: 2, status: 'available', rating: 5.0, reviews: 0, emoji, color: colors[Math.floor(Math.random()*colors.length)], desc, specs: [] });
  closeModal();
  showToast(`${name} berhasil ditambahkan! ✅`, 'success');
  navigate(currentPage);
}

function openEditItemModal(id) {
  const item = store.items.find(i => i.id === id);
  openModal(`Edit: ${item.name}`, `
    <div class="form-group"><label>Nama Alat</label><input type="text" value="${item.name}" id="ei_name"></div>
    <div class="form-group"><label>Harga per Hari (Rp)</label><input type="number" value="${item.price}" id="ei_price"></div>
    <div class="form-group"><label>Status</label>
      <select id="ei_status">
        <option value="available" ${item.status==='available'?'selected':''}>Tersedia</option>
        <option value="rented" ${item.status==='rented'?'selected':''}>Disewa</option>
      </select>
    </div>
    <div class="form-group"><label>Deskripsi</label><textarea id="ei_desc">${item.desc}</textarea></div>
  `, `
    <button class="btn btn-danger btn-sm" onclick="deleteItem(${id})">Hapus Alat</button>
    <div style="flex:1;"></div>
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="saveEditItem(${id})">Simpan</button>
  `);
}

function saveEditItem(id) {
  const item = store.items.find(i => i.id === id);
  item.name = document.getElementById('ei_name').value;
  item.price = parseInt(document.getElementById('ei_price').value);
  item.status = document.getElementById('ei_status').value;
  item.desc = document.getElementById('ei_desc').value;
  closeModal();
  showToast('Alat berhasil diperbarui! ✅', 'success');
  navigate(currentPage);
}

function deleteItem(id) {
  const idx = store.items.findIndex(i => i.id === id);
  store.items.splice(idx, 1);
  closeModal();
  showToast('Alat dihapus.', 'error');
  navigate(currentPage);
}

}

function calcBookingTotal() {
  const start = new Date(document.getElementById('bk_start').value);
  const end = new Date(document.getElementById('bk_end').value);
  const days = Math.max(1, Math.round((end - start) / 86400000));
  const price = window._bookingItemPrice || 150000;
  const rent = price * days;
  const fee = Math.round(rent * 0.05);
  const ins = 25000;
  const total = rent + fee + ins;
  document.getElementById('bk_rent').textContent = rupiah(rent) + ` (${days} hari)`;
  document.getElementById('bk_fee').textContent = rupiah(fee);
  document.getElementById('bk_total').textContent = rupiah(total);
}

function submitBooking(itemId, itemName, emoji) {
  const start = document.getElementById('bk_start').value;
  const end = document.getElementById('bk_end').value;
  const pay = document.getElementById('bk_pay').value;
  if (!start || !end || start >= end) { showToast('Pilih tanggal yang valid!', 'error'); return; }
  const days = Math.round((new Date(end) - new Date(start)) / 86400000);
  const price = window._bookingItemPrice || 150000;
  const total = price * days + Math.round(price * days * 0.05) + 25000;
  const id = 'BK' + String(store.bookings.length + 1).padStart(3,'0');
  store.bookings.push({ id, itemId, item: itemName, emoji, borrower: 'Budi Santoso', borrowerId: 1, tenant: 'Andi Wijaya', tenantId: 2, start, end, days, total, status: 'pending', payment: pay, created: new Date().toISOString().slice(0,10) });
  closeModal();
  showToast(`Pesanan ${id} berhasil dibuat! 🎉`, 'success');
  navigate('my_bookings');
}

function openReviewModal(itemId, itemName) {
  openModal(`Ulasan: ${itemName}`, `
    <div class="form-group">
      <label>Rating</label>
      <div style="display:flex;gap:8px;font-size:1.5rem;cursor:pointer;" id="starSelect">
        ${[1,2,3,4,5].map(s=>`<span onclick="setStarRating(${s})" id="star${s}" style="color:var(--gray-200);">★</span>`).join('')}
      </div>
      <input type="hidden" id="rv_rating" value="0">
    </div>
    <div class="form-group"><label>Komentar</label><textarea id="rv_comment" placeholder="Ceritakan pengalaman sewa Anda..."></textarea></div>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    <button class="btn btn-primary" onclick="submitReview(${itemId},'${itemName}')">Kirim Ulasan</button>
  `);
}

function setStarRating(n) {
  document.getElementById('rv_rating').value = n;
  [1,2,3,4,5].forEach(s => {
    document.getElementById(`star${s}`).style.color = s <= n ? '#f59e0b' : 'var(--gray-200)';
  });
}

function submitReview(itemId, itemName) {
  const rating = parseInt(document.getElementById('rv_rating').value);
  const comment = document.getElementById('rv_comment').value;
  if (!rating) { showToast('Pilih rating dulu!', 'error'); return; }
  if (!comment) { showToast('Komentar wajib diisi!', 'error'); return; }
  store.reviews.push({ id: store.reviews.length+1, itemId, item: itemName, borrower: 'Budi Santoso', rating, comment, date: new Date().toISOString().slice(0,10) });
  closeModal();
  showToast('Ulasan berhasil dikirim! ⭐', 'success');
}

// ─── BOOKING ACTIONS (Tenant) ───
function approveBooking(id) {
  const b = store.bookings.find(b => b.id === id);
  b.status = 'active';
  b.payment = 'GoPay';
  showToast(`Pesanan ${id} diterima! ✅`, 'success');
  navigate(currentPage);
}

function rejectBooking(id) {
  const b = store.bookings.find(b => b.id === id);
  b.status = 'cancelled';
  showToast(`Pesanan ${id} ditolak.`, 'error');
  navigate(currentPage);
}

function completeBooking(id) {
  const b = store.bookings.find(b => b.id === id);
  const item = store.items.find(i => i.id === b.itemId);
  b.status = 'completed';
  if (item) item.status = 'available';
  showToast(`Pesanan ${id} selesai! Pembayaran diterima ✅`, 'success');
  navigate(currentPage);
}

function cancelBooking(id) {
  const b = store.bookings.find(b => b.id === id);
  b.status = 'cancelled';
  showToast(`Pesanan ${id} dibatalkan.`, 'error');
  navigate(currentPage);
}

// ─── USER ACTIONS ───
function suspendUser(id) {
  store.users.find(u => u.id === id).status = 'suspended';
  showToast('Pengguna ditangguhkan.', 'error');
  navigate(currentPage);
}
function activateUser(id) {
  store.users.find(u => u.id === id).status = 'active';
  showToast('Pengguna diaktifkan! ✅', 'success');
  navigate(currentPage);
}

// ─── NOTIFICATIONS ───
function renderNotifications() {
  const role = store.currentRole;
  const notifs = store.notifications[role] || [];
  const list = document.getElementById('notifList');
  list.innerHTML = notifs.map(n=>`
    <div class="notif-item ${n.read?'':'notif-unread'}">
      <div class="notif-icon">${n.icon}</div>
      <div>
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
      </div>
    </div>`).join('');
}

function toggleNotif(btn) {
  const panel = document.getElementById('notifPanel');
  if (activeNotifBtn && activeNotifBtn !== btn) {
    document.getElementById('notifPanel').classList.remove('open');
  }
  panel.classList.toggle('open');
  activeNotifBtn = btn;
}

function markAllRead() {
  const role = store.currentRole;
  (store.notifications[role]||[]).forEach(n => n.read = true);
  renderNotifications();
  document.querySelector('.notif-dot').style.display = 'none';
}

// Close notif on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.notif-btn')) {
    document.getElementById('notifPanel')?.classList.remove('open');
  }
});
document.addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ─── FILTER / SEARCH ───
function setFilter(btn, val) {
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = val;
}

function filterProducts(q) {
  const grid = document.getElementById('productGrid');
  if (!grid) return;
  const cards = grid.querySelectorAll('.product-card');
  cards.forEach(c => {
    const name = c.querySelector('.product-name')?.textContent.toLowerCase() || '';
    c.style.display = name.includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ─── TOAST ───
function showToast(msg, type='') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'💬'}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// ─── LOGOUT ───
function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('role-select-screen').style.display = 'flex';
  store.currentRole = null;
}
</script>
</body>
